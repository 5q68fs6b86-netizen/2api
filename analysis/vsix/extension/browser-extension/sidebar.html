<!doctype html>
<html lang="en" style="background: #000 !important; margin: 0; padding: 0">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark" />
    <title>Kombai</title>
    <style>
      html {
        margin: 0 !important;
        padding: 0 !important;
        width: 100% !important;
        height: 100% !important;
        background: #000 !important;
        overflow: hidden !important;
      }

      body {
        margin: 0 !important;
        padding: 0 !important;
        width: 100% !important;
        height: 100% !important;
        background: #000 !important;
        color: #fff !important;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        overflow: hidden !important;
      }

      iframe {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        border: none;
        display: none;
        color-scheme: dark;
      }

      iframe.loaded {
        display: block;
      }

      #loading {
        position: absolute;
        top: 0;
        left: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        height: 100%;
        font-size: 14px;
        color: white;
        background: #000;
        z-index: 1000;
        font-size: 16px;
      }

      #loading.hidden {
        display: none;
      }

      #loading img {
        animation: pulse 2.5s ease-in-out infinite;
      }

      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.7;
        }
      }
    </style>
  </head>

  <body style="background: #000 !important; margin: 0 !important; padding: 0 !important">
    <div id="loading">
      <img src="icons/kombai-logo.svg" alt="Kombai" width="64" height="64" />
    </div>
    <iframe id="kombai-iframe" src="./iframe-ui/index.html"></iframe>
    <script src="sidebar-init.js"></script>
    <script src="sidebar.js"></script>
  </body>
</html>
