name: Build Docker and Deploy to Hugging Face Space

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: deploy-hf-space
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image names
        id: image
        shell: bash
        run: |
          image="ghcr.io/${GITHUB_REPOSITORY}"
          image="$(echo "$image" | tr '[:upper:]' '[:lower:]')"
          echo "sha=${image}:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "latest=${image}:latest" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.image.outputs.sha }}
            ${{ steps.image.outputs.latest }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy Space wrapper
        shell: bash
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE_ID: ${{ secrets.HF_SPACE_ID || vars.HF_SPACE_ID }}
          IMAGE_REF: ${{ steps.image.outputs.sha }}
        run: |
          set -euo pipefail

          if [ -z "${HF_TOKEN:-}" ]; then
            echo "Missing required GitHub secret: HF_TOKEN" >&2
            exit 1
          fi

          if [ -z "${HF_SPACE_ID:-}" ]; then
            echo "Missing required GitHub secret or variable: HF_SPACE_ID, for example username/space-name" >&2
            exit 1
          fi

          workdir="$(mktemp -d)"
          cd "$workdir"

          cat > README.md <<'EOF'
          ---
          title: 2api
          emoji: "💩"
          colorFrom: blue
          colorTo: gray
          sdk: docker
          app_port: 7860
          pinned: false
          ---
          EOF

          cat > Dockerfile <<EOF
          FROM ${IMAGE_REF}

          ENV PORT=7860
          ENV DATA_DIR=/data

          EXPOSE 7860
          EOF

          git init
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md Dockerfile
          git commit -m "Deploy ${IMAGE_REF}"
          git branch -M main
          git remote add space "https://oauth2:${HF_TOKEN}@huggingface.co/spaces/${HF_SPACE_ID}"
          git push --force space main
